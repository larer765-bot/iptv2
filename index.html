<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamWave - Web IPTV Player</title>
    <!-- Manifest pour installation PWA -->
    <link rel="manifest" href='data:application/json,{"name":"StreamWave IPTV","short_name":"StreamWave","start_url":"./index.html","display":"standalone","background_color":"#030712","theme_color":"#0ea5e9","icons":[{"src":"https://placehold.co/192x192/0ea5e9/white?text=SW","sizes":"192x192","type":"image/png"}]}'>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { touch-action: manipulation; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .aspect-video { aspect-ratio: 16 / 9; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

    <header class="bg-gray-900 border-b border-gray-800 p-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <h1 class="text-lg font-bold flex items-center gap-2 text-white">
                <i class="fa-solid fa-tv text-brand-500"></i> StreamWave
            </h1>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-gray-800 rounded-lg">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section id="sidebar" class="lg:col-span-4 bg-gray-900 border border-gray-800 rounded-2xl h-[60vh] lg:h-[calc(100vh-120px)] flex flex-col">
            <div class="p-4 border-b border-gray-800">
                <input type="text" id="playlist-url" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 text-sm" placeholder="URL playlist M3U...">
                <button onclick="loadPlaylist()" class="w-full mt-2 bg-blue-600 py-2 rounded-lg text-sm font-bold">Charger Playlist</button>
            </div>
            <div id="channel-list" class="flex-1 overflow-y-auto p-2"></div>
        </section>

        <section class="lg:col-span-8 flex flex-col gap-4">
            <div class="bg-black rounded-2xl overflow-hidden aspect-video relative shadow-2xl">
                <video id="video-player" controls autoplay class="w-full h-full"></video>
            </div>
        </section>
    </main>

    <script>
        const video = document.getElementById('video-player');
        let hls;

        function loadPlaylist() {
            const url = document.getElementById('playlist-url').value;
            // Note: Implementation simplifiée pour la démonstration
            console.log("Chargement de :", url);
            alert("Pour une fluidité maximale, assurez-vous d'utiliser un lien M3U direct.");
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                document.getElementById('sidebar').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
